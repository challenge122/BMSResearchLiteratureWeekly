{"公众号名称":"锂电10000问","发布日期":"2026-04-09","标题":"硅在首次锂化与后续循环中锂化行为的本质差异","Highlight":"1. 通过原位TEM揭示了硅负极首次锂化与后续循环的机理差异：首次锂化是“晶体硅→非晶LiₓSi”的两相反应，伴随巨大体积膨胀；后续循环是“非晶LiₓSi”的固溶体反应，体积变化相对较小。2. 量化了首次循环形成的非晶LiₓSi基质对缓冲后续循环应力的关键作用。","分类":"新材料硅负极","对BMS应用的价值":"明确了硅负极“首效”与“循环”背后的机理差异，为BMS在电池初期进行差异化充放电策略（如化成优化）提供了理论依据，以构建稳定SEI和电极结构。","链接":"https://mp.weixin.qq.com/s/4UuybZaWSOGMV5amV87agA"},

    function escapeHtml(text) {

    // 生成文章唯一 slug（基于链接的 pathname 部分，过滤特殊字符）
    function getSlugFromUrl(url) {
      try {
        const path = new URL(url).pathname;
        // 取 path 中最后一段，去掉开头的 '/'
        const slug = path.split('/').filter(p => p).pop() || path.replace(/[^a-zA-Z0-9]/g, '_');
        return slug;
      } catch (e) {
        // 降级：直接用整个 url 做简单清洗
        return url.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 50);
      }

   // 从 Worker 加载评论
async function loadCommentsFromWorker(slug) {
      try {
        // We use WORKER_URL + 'comments' because your WORKER_URL already has a / at the end

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const comments = await res.json();
        return Array.isArray(comments) ? comments : [];
      } catch (error) {
        console.error('Failed to load:', error);
        return [];
      }
    }

      const response = await fetch(`${WORKER_URL}comments`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ slug, author, content })
      });
      if (!response.ok) throw new Error('Failed to save');
      return await response.json();

          const timeStr = c.timestamp ? new Date(c.timestamp).toLocaleString('zh-CN', {hour12: false, hour: '2-digit', minute:'2-digit', month:'2-digit', day:'2-digit'}) : '';
        html += `<li class="comment-item" style="list-style: none; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px dashed #eee;">
  <div class="comment-meta" style="display: flex; justify-content: space-between; margin-bottom: 4px;">
    <span class="comment-author" style="font-weight: bold; color: #4682c8;">
      <i class="far fa-user-circle"></i> ${escapeHtml(c.author || '匿名')}
    </span>
    <span class="comment-time" style="font-size: 0.85em; color: #999;">${escapeHtml(timeStr)}</span>
  </div>
  <div class="comment-body" style="color: #333; line-height: 1.5; word-wrap: break-word;">
    ${escapeHtml(c.body || c.content || '')} 
  </div>
</li>`;
        });
        listContainer.innerHTML = html;
      }
      
      // 更新评论数显示
      const toggle = panelElement.closest('.card')?.querySelector('.comment-toggle');
      if (toggle) {
        const count = comments.length;
        toggle.innerHTML = `<i class="far fa-comment"></i> 评论 (${count}) <i class="fas fa-chevron-down" style="margin-left: auto; font-size: 0.8rem;"></i>`;
      }
    }

    // 判断搜索匹配
    function matchesSearch(article, keyword) {
      if (!keyword) return true;
      const k = keyword.toLowerCase();
      return (
        article.标题.toLowerCase().includes(k) ||
        article.公众号名称.toLowerCase().includes(k) ||
        article.分类.toLowerCase().includes(k) ||
        article.Highlight.toLowerCase().includes(k) ||
        article.对BMS应用的价值.toLowerCase().includes(k)
      );
    }

// --- 替换后的增强过滤与排序函数 ---
function getFilteredArticles() {
  let filtered = articles.filter(art => {
    const matchCategory = currentCategory === '全部' || art.分类 === currentCategory;
    const matchSource = currentSource === '全部' || art.公众号名称 === currentSource;
    const matchKeyword = !searchKeyword || 
                         art.标题.toLowerCase().includes(searchKeyword.toLowerCase()) ||
                         art.Highlight.toLowerCase().includes(searchKeyword.toLowerCase());
    return matchCategory && matchSource && matchKeyword;
  });

  // --- 新增排序逻辑 ---
  filtered.sort((a, b) => {
    const slugA = getSlugFromUrl(a.链接);
    const slugB = getSlugFromUrl(b.链接);
    const statsA = window.statsMap[slugA] || { likes: 0, comments: 0 };
    const statsB = window.statsMap[slugB] || { likes: 0, comments: 0 };

    if (window.currentSort === 'likes') {
      return statsB.likes - statsA.likes; // 点赞从高到低
    } else if (window.currentSort === 'comments') {
      return statsB.comments - statsA.comments; // 评论从高到低
    } else {
      // 默认按日期排序
      return new Date(b.发布日期) - new Date(a.发布日期);
    }
  });

  return filtered;
}

function renderCards() {
      const filtered = getFilteredArticles();
      const totalFiltered = filtered.length;
      const totalPages = Math.ceil(totalFiltered / cardsPerPage) || 1;
      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;
      const start = (currentPage - 1) * cardsPerPage;
      const pageArticles = filtered.slice(start, start + cardsPerPage);
      const container = document.getElementById('cards-container');
      
      if (pageArticles.length === 0) {
        container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:48px; color:#64748b;"><i class="fas fa-inbox"></i> 没有匹配的文章</div>`;
      } else {
        let cardsHtml = '';
        pageArticles.forEach(art => {
          const slug = getSlugFromUrl(art.链接);
          // 优先使用已抓取的全局数据，避免重复请求网络
          const stats = window.statsMap && window.statsMap[slug] ? window.statsMap[slug] : { likes: 0, comments: 0 };
          const isLiked = localStorage.getItem('liked_' + slug) === 'true';

          cardsHtml += `
            <div class="card" data-article-link="${escapeHtml(art.链接)}">
              <div class="card-title">${escapeHtml(art.标题)}</div>
              <div class="card-meta">
                <span class="meta-item"><i class="fas fa-user-pen"></i>公众号：${escapeHtml(art.公众号名称)}</span>
                <span class="meta-item"><i class="far fa-calendar"></i>${escapeHtml(art.发布日期)}</span>
                <span class="meta-item"><i class="fas fa-tag"></i>${escapeHtml(art.分类)}</span>
              </div>
              <div class="field-block"><div class="field-label"><i class="fas fa-highlighter"></i> Highlight</div><div class="field-content highlight-text">${escapeHtml(art.Highlight)}</div></div>
              <div class="field-block"><div class="field-label"><i class="fas fa-microchip"></i> 对BMS应用的价值</div><div class="field-content value-text">${escapeHtml(art.对BMS应用的价值)}</div></div>
              <div class="link-row">
                <a class="card-link" href="${escapeHtml(art.链接)}" target="_blank" rel="noopener"><i class="fas fa-external-link-alt"></i> 阅读原文</a>
              </div>
              
              <div class="interaction-row" style="display: flex; align-items: center; gap: 15px; margin-top: 15px; border-top: 1px solid rgba(59, 130, 246, 0.1); padding-top: 12px;">
                <div class="like-btn ${isLiked ? 'active' : ''}" data-link="${escapeHtml(art.链接)}" style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: 600; font-size: 0.9rem; color: ${isLiked ? '#ef4444' : '#64748b'}; padding: 6px 12px; border-radius: 40px; transition: all 0.2s; user-select: none;">
                  <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i> <span class="like-count">${stats.likes}</span>
                </div>
                <div class="comment-toggle" data-link="${escapeHtml(art.链接)}" style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-weight: 600; color: #1e4b7a; font-size: 0.9rem; user-select: none; padding: 6px 4px; border-radius: 40px;">
                  <i class="far fa-comment"></i> 评论 (${stats.comments}) <i class="fas fa-chevron-down" style="margin-left: auto; font-size: 0.8rem; transition: transform 0.2s;"></i>
                </div>
              </div>

              <div class="comment-section" style="margin-top: 5px;">
                <div class="comment-panel">
                  <div class="comment-input-area"><div class="comment-input-row"><input type="text" class="comment-nickname" placeholder="昵称" maxlength="20"><input type="text" class="comment-text" placeholder="写评论..." maxlength="200"><button class="comment-submit"><i class="fas fa-paper-plane"></i> 发布</button></div></div>
                  <ul class="comment-list"></ul>
                </div>
              </div>
            </div>
          `;
        });
        container.innerHTML = cardsHtml;
      }

      // 绑定交互逻辑
      pageArticles.forEach(art => {
        const slug = getSlugFromUrl(art.链接);
        const card = document.querySelector(`.card[data-article-link="${escapeHtml(art.链接)}"]`);
        if (!card) return;

        const likeBtn = card.querySelector('.like-btn');
        const likeCountSpan = likeBtn.querySelector('.like-count');
        const panel = card.querySelector('.comment-panel');
        const toggle = card.querySelector('.comment-toggle');
        const nicknameInput = panel.querySelector('.comment-nickname');
        const textInput = panel.querySelector('.comment-text');
        const submitBtn = panel.querySelector('.comment-submit');

        // 点赞/取消点赞切换点击事件
        likeBtn.addEventListener('click', async () => {
          const isLiked = localStorage.getItem('liked_' + slug) === 'true';
          const action = isLiked ? 'unlike' : 'like';

          // 立即更新 UI，无需等待网络
          if (action === 'like') {
            likeBtn.style.color = '#ef4444';
            likeBtn.querySelector('i').className = 'fas fa-heart';
            likeCountSpan.innerText = parseInt(likeCountSpan.innerText) + 1;
            localStorage.setItem('liked_' + slug, 'true');
          } else {
            likeBtn.style.color = '#64748b';
            likeBtn.querySelector('i').className = 'far fa-heart';
            likeCountSpan.innerText = Math.max(0, parseInt(likeCountSpan.innerText) - 1);
            localStorage.removeItem('liked_' + slug);
          }

          try {
            const res = await fetch(`${WORKER_URL}likes`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ slug: slug, action: action })
            });
            if (!res.ok) throw new Error('网络请求失败');
            const data = await res.json();
            likeCountSpan.innerText = data.likes;
            if(window.statsMap && window.statsMap[slug]) window.statsMap[slug].likes = data.likes;
          } catch (e) {
            console.error("点赞请求异常:", e);
          }
        });

        // 核心优化：评论区【只有被点击展开时】才去请求网络加载评论！极大减轻了手机端负担！
        toggle.addEventListener('click', (e) => {
          e.stopPropagation();
          const isShowing = panel.classList.contains('show');
          if (!isShowing) {
             panel.classList.add('show');
             toggle.querySelector('.fa-chevron-down').style.transform = 'rotate(180deg)';
             renderCommentPanel(art, panel); 
          } else {
             panel.classList.remove('show');
             toggle.querySelector('.fa-chevron-down').style.transform = 'rotate(0deg)';
          }
        });

        // 提交评论逻辑
        submitBtn.addEventListener('click', async () => {
          const nickname = nicknameInput.value.trim();
          const content = textInput.value.trim();
          if (!content || !nickname) { alert('请填写昵称和内容'); return; }
          
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i>';
          
          try {
            await submitCommentToWorker(slug, nickname, content);
            await renderCommentPanel(art, panel);
            nicknameInput.value = '';
            textInput.value = '';
            
            // 更新 UI 上的评论数
            if(window.statsMap && window.statsMap[slug]) window.statsMap[slug].comments += 1;
            const currentComments = parseInt(toggle.innerText.match(/\d+/)[0] || 0) + 1;
            toggle.innerHTML = `<i class="far fa-comment"></i> 评论 (${currentComments}) <i class="fas fa-chevron-down" style="margin-left: auto; font-size: 0.8rem; transform: rotate(180deg);"></i>`;
          } catch (error) {
            alert('提交失败：' + error.message);
          } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> 发布';
          }
        });
      });

      document.getElementById('stats-text').innerHTML = `当前显示 ${totalFiltered} 篇中的 ${pageArticles.length} 篇 · 第 ${currentPage} / ${totalPages} 页`;
      renderPagination(totalFiltered, totalPages);
    }

    function renderFilterTags() {
      const catContainer = document.getElementById('category-filters');
      const srcContainer = document.getElementById('source-filters');
      let catHtml = `<span class="filter-tag ${currentCategory === '全部' ? 'active' : ''}" data-category="全部">全部 (${articles.length})</span>`;
      allCategories.sort().forEach(cat => { const count = articles.filter(a => a.分类 === cat).length; catHtml += `<span class="filter-tag ${currentCategory === cat ? 'active' : ''}" data-category="${cat}">${cat} (${count})</span>`; });
      catContainer.innerHTML = catHtml;
      let srcHtml = `<span class="filter-tag ${currentSource === '全部' ? 'active' : ''}" data-source="全部">全部 (${articles.length})</span>`;
      allSources.sort().forEach(src => { const count = articles.filter(a => a.公众号名称 === src).length; srcHtml += `<span class="filter-tag ${currentSource === src ? 'active' : ''}" data-source="${src}">${src} (${count})</span>`; });
      srcContainer.innerHTML = srcHtml;
      document.querySelectorAll('[data-category]').forEach(t => t.addEventListener('click', () => { currentCategory = t.dataset.category; currentPage = 1; renderFilterTags(); renderAll(); }));
      document.querySelectorAll('[data-source]').forEach(t => t.addEventListener('click', () => { currentSource = t.dataset.source; currentPage = 1; renderFilterTags(); renderAll(); }));
    }

    function renderPagination(totalItems, totalPages) {
      const pg = document.getElementById('pagination-controls');
      if (totalPages <= 1) { pg.innerHTML = `<span style="color:#7c8fa3;">—— 只有一页 ——</span>`; return; }
      let h = `<button class="pagination-btn" id="prev-page" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i> 上一页</button><div class="page-numbers">`;
      const maxV = 5; let s = Math.max(1, currentPage - 2), e = Math.min(totalPages, s + maxV - 1); if (e - s < maxV - 1) s = Math.max(1, e - maxV + 1);
      if (s > 1) { h += `<span class="page-num" data-page="1">1</span>`; if (s > 2) h += `<span class="page-num disabled">…</span>`; }
      for (let i = s; i <= e; i++) h += `<span class="page-num ${i === currentPage ? 'active-page' : ''}" data-page="${i}">${i}</span>`;
      if (e < totalPages) { if (e < totalPages - 1) h += `<span class="page-num disabled">…</span>`; h += `<span class="page-num" data-page="${totalPages}">${totalPages}</span>`; }
      h += `</div><button class="pagination-btn" id="next-page" ${currentPage === totalPages ? 'disabled' : ''}>下一页 <i class="fas fa-chevron-right"></i></button>`;
      pg.innerHTML = h;
      document.querySelectorAll('[data-page]').forEach(b => b.addEventListener('click', () => { const p = parseInt(b.dataset.page); if (p !== currentPage) { currentPage = p; renderAll(); window.scrollTo({top:0,behavior:'smooth'}); } }));
      document.getElementById('prev-page')?.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderAll(); window.scrollTo({top:0,behavior:'smooth'}); } });
      document.getElementById('next-page')?.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; renderAll(); window.scrollTo({top:0,behavior:'smooth'}); } });
    }

    function renderAll() { renderCards(); }

    const searchInput = document.getElementById('search-input');
    const clearSearchBtn = document.getElementById('clear-search-btn');
    function applySearch() {
      searchKeyword = searchInput.value.trim();
      currentPage = 1;
      renderAll();
    }
    searchInput.addEventListener('input', applySearch);
    clearSearchBtn.addEventListener('click', () => {
      searchInput.value = '';
      applySearch();
    });

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('reset-filters-btn').addEventListener('click', () => {
        currentCategory = '全部';
        currentSource = '全部';
        searchInput.value = '';
        searchKeyword = '';
        currentPage = 1;
        renderFilterTags();
        renderAll();
      });
      renderFilterTags();
      renderAll();
    });

    // --- 排序相关的全局配置 ---
window.currentSort = 'date';
window.statsMap = {}; 

// 监听下拉菜单切换
const sortSelector = document.getElementById('sort-selector');
if(sortSelector) {
    sortSelector.addEventListener('change', function(e) {
        window.currentSort = e.target.value;
        currentPage = 1;
        
        // 如果数据还没抓完就选了点赞排序，给用户一个微调提示
        if (window.currentSort !== 'date') {
            console.log("正在按照实时数据重新排序...");
        }
        
        renderAll(); // 重新渲染列表并触发一次数据校验
    });
}

// 静默同步点赞和评论数据
// 稳定版：静默分批同步点赞和评论数据

    // 全局变量，防止重复抓取
let isFullSyncing = false;

async function syncStats() {
    const allFiltered = getFilteredArticles();
    // 1. 优先级：先找出当前页的 slug
    const start = (currentPage - 1) * cardsPerPage;
    const pageArticles = allFiltered.slice(start, start + cardsPerPage);
    const pageSlugs = pageArticles.map(art => getSlugFromUrl(art.链接));

    // 2. 快速抓取当前页数据
    await Promise.all(pageSlugs.map(async (slug) => {
        if (window.statsMap[slug]) return;
        try {
            const [lRes, cRes] = await Promise.all([
                fetch(`${WORKER_URL}likes?slug=${encodeURIComponent(slug)}`).then(r => r.json()),
                fetch(`${WORKER_URL}comments?slug=${encodeURIComponent(slug)}`).then(r => r.json())
            ]);
            window.statsMap[slug] = { likes: lRes.likes || 0, comments: Array.isArray(cRes) ? cRes.length : 0 };
        } catch (e) { window.statsMap[slug] = { likes: 0, comments: 0 }; }
    }));
    
    // 当前页数据一到，立刻刷新显示
    renderCards();

    // 3. 后台静默抓取剩余所有数据（为了支持点击排序时的准确性）
    if (isFullSyncing) return; 
    isFullSyncing = true;

    // 分批抓取，每组 5 个，避免手机网络堵塞
    for (let i = 0; i < articles.length; i += 5) {
        const batch = articles.slice(i, i + 5);
        await Promise.all(batch.map(async (art) => {
            const slug = getSlugFromUrl(art.链接);
            if (window.statsMap[slug]) return; // 跳过已抓取的
            try {
                const [lRes, cRes] = await Promise.all([
                    fetch(`${WORKER_URL}likes?slug=${encodeURIComponent(slug)}`).then(r => r.json()),
                    fetch(`${WORKER_URL}comments?slug=${encodeURIComponent(slug)}`).then(r => r.json())
                ]);
                window.statsMap[slug] = { likes: lRes.likes || 0, comments: Array.isArray(cRes) ? cRes.length : 0 };
            } catch (e) { window.statsMap[slug] = { likes: 0, comments: 0 }; }
        }));
    }
}
    
syncStats();
  })();


</script>
