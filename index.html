      color: #1e293b;

      cursor: not-allowed;
      background: #f3f6fa;
    }

      gap: 8px;
      flex-wrap: wrap;
    }

      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 60px;
      background: rgba(255,255,255,0.8);

    }

    .result-stats {
      text-align: center;
      margin-bottom: 10px;
      color: #3f688b;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .footer-note {
      margin-top: 30px;
      color: #6c7f94;
      font-size: 0.8rem;
      text-align: center;
      border-top: 1px solid rgba(59,130,246,0.15);
      padding-top: 20px;
    }

    i {
      margin-right: 2px;
    }
  </style>
</head>

    ];

    // 过滤 & 排序
    const articles = rawArticles
      .filter(a => a.分类 !== '不符合')
      .sort((a, b) => (b.发布日期 > a.发布日期) ? 1 : -1);

    // ---------- 全局变量 ----------
    let currentCategory = '全部';
    let currentSource = '全部';
    let searchKeyword = '';
    const cardsPerPage = 6;
    let currentPage = 1;

    const allCategories = [...new Set(articles.map(a => a.分类))];
    const allSources = [...new Set(articles.map(a => a.公众号名称))];

    // 辅助函数：转义 HTML
    function escapeHtml(text) {
      if (!text) return text;
      return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    // 生成文章唯一 slug（基于链接的 pathname 部分，过滤特殊字符）
    function getSlugFromUrl(url) {
      try {
        const path = new URL(url).pathname;
        // 取 path 中最后一段，去掉开头的 '/'
        const slug = path.split('/').filter(p => p).pop() || path.replace(/[^a-zA-Z0-9]/g, '_');
        return slug;
      } catch (e) {
        // 降级：直接用整个 url 做简单清洗
        return url.replace(/[^a-zA-Z0-9]/g, '_').slice(0, 50);
      }
    }

   // 从 Worker 加载评论
async function loadCommentsFromWorker(slug) {
      try {
        // We use WORKER_URL + 'comments' because your WORKER_URL already has a / at the end
        const res = await fetch(`${WORKER_URL}comments?slug=${encodeURIComponent(slug)}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const comments = await res.json();
        return Array.isArray(comments) ? comments : [];
      } catch (error) {
        console.error('Failed to load:', error);
        return [];
      }
    }

    async function submitCommentToWorker(slug, author, content) {
      const response = await fetch(`${WORKER_URL}comments`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ slug, author, content })
      });
      if (!response.ok) throw new Error('Failed to save');
      return await response.json();
    }

    // 渲染评论区（异步加载并填充）
    async function renderCommentPanel(article, panelElement) {
      const slug = getSlugFromUrl(article.链接);
      const listContainer = panelElement.querySelector('.comment-list');
      if (!listContainer) return;
      
      // 显示加载中
      listContainer.innerHTML = `<div class="empty-comment"><i class="fas fa-spinner fa-pulse"></i> 加载评论中...</div>`;
      
      const comments = await loadCommentsFromWorker(slug);
      
      if (comments.length === 0) {
        listContainer.innerHTML = `<div class="empty-comment"><i class="far fa-comment-dots"></i> 暂无评论，快来抢沙发</div>`;
      } else {
        let html = '';
        // 按时间倒序（最新的在前）
        comments.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp)).forEach(c => {
          const timeStr = c.timestamp ? new Date(c.timestamp).toLocaleString('zh-CN', {hour12: false, hour: '2-digit', minute:'2-digit', month:'2-digit', day:'2-digit'}) : '';
          html += `<li class="comment-item">
            <div class="comment-meta"><span class="comment-author"><i class="far fa-user-circle"></i> ${escapeHtml(c.author || '匿名')}</span><span class="comment-time">${escapeHtml(timeStr)}</span></div>
            <div class="comment-body">${escapeHtml(c.content || '')}</div>
          </li>`;
        });
        listContainer.innerHTML = html;
      }
      
      // 更新评论数显示
      const toggle = panelElement.closest('.card')?.querySelector('.comment-toggle');
      if (toggle) {
        const count = comments.length;
        toggle.innerHTML = `<i class="far fa-comment"></i> 评论 (${count}) <i class="fas fa-chevron-down" style="margin-left: auto; font-size: 0.8rem;"></i>`;
      }
    }

    // 判断搜索匹配
    function matchesSearch(article, keyword) {
      if (!keyword) return true;
      const k = keyword.toLowerCase();
      return (
        article.标题.toLowerCase().includes(k) ||
        article.公众号名称.toLowerCase().includes(k) ||
        article.分类.toLowerCase().includes(k) ||
        article.Highlight.toLowerCase().includes(k) ||
        article.对BMS应用的价值.toLowerCase().includes(k)
      );
    }

    function getFilteredArticles() {
      return articles.filter(article => {
        const catMatch = (currentCategory === '全部') || (article.分类 === currentCategory);
        const srcMatch = (currentSource === '全部') || (article.公众号名称 === currentSource);
        const searchMatch = matchesSearch(article, searchKeyword);
        return catMatch && srcMatch && searchMatch;
      });
    }

    function renderCards() {
      const filtered = getFilteredArticles();
      const totalFiltered = filtered.length;
      const totalPages = Math.ceil(totalFiltered / cardsPerPage) || 1;
      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;
      const start = (currentPage - 1) * cardsPerPage;
      const pageArticles = filtered.slice(start, start + cardsPerPage);
      const container = document.getElementById('cards-container');
      
      if (pageArticles.length === 0) {
        container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:48px; color:#64748b;"><i class="fas fa-inbox"></i> 没有匹配的文章</div>`;
      } else {
        let cardsHtml = '';
        pageArticles.forEach(art => {
          cardsHtml += `
            <div class="card" data-article-link="${escapeHtml(art.链接)}">
              <div class="card-title">${escapeHtml(art.标题)}</div>
              <div class="card-meta">
                <span class="meta-item"><i class="fas fa-user-pen"></i>公众号：${escapeHtml(art.公众号名称)}</span>
                <span class="meta-item"><i class="far fa-calendar"></i>${escapeHtml(art.发布日期)}</span>
                <span class="meta-item"><i class="fas fa-tag"></i>${escapeHtml(art.分类)}</span>
              </div>
              <div class="field-block"><div class="field-label"><i class="fas fa-highlighter"></i> Highlight</div><div class="field-content highlight-text">${escapeHtml(art.Highlight)}</div></div>
              <div class="field-block"><div class="field-label"><i class="fas fa-microchip"></i> 对BMS应用的价值</div><div class="field-content value-text">${escapeHtml(art.对BMS应用的价值)}</div></div>
              <div class="link-row">
                <a class="card-link" href="${escapeHtml(art.链接)}" target="_blank" rel="noopener"><i class="fas fa-external-link-alt"></i> 阅读原文</a>
              </div>
              <div class="comment-section">
                <div class="comment-toggle" data-link="${escapeHtml(art.链接)}"><i class="far fa-comment"></i> 评论 (0) <i class="fas fa-chevron-down" style="margin-left: auto; font-size: 0.8rem;"></i></div>
                <div class="comment-panel">
                  <div class="comment-input-area"><div class="comment-input-row"><input type="text" class="comment-nickname" placeholder="昵称" maxlength="20"><input type="text" class="comment-text" placeholder="写评论..." maxlength="200"><button class="comment-submit"><i class="fas fa-paper-plane"></i> 发布</button></div></div>
                  <ul class="comment-list"></ul>
                </div>
              </div>
            </div>
          `;
        });
        container.innerHTML = cardsHtml;
      }

      // 为每个卡片绑定评论交互
      pageArticles.forEach(art => {
        const link = art.链接;
        const card = document.querySelector(`.card[data-article-link="${link}"]`);
        if (!card) return;
        const panel = card.querySelector('.comment-panel');
        const toggle = card.querySelector('.comment-toggle');
        const nicknameInput = panel.querySelector('.comment-nickname');
        const textInput = panel.querySelector('.comment-text');
        const submitBtn = panel.querySelector('.comment-submit');
        const listContainer = panel.querySelector('.comment-list');

        // 初始化加载评论
        const slug = getSlugFromUrl(art.链接);
        renderCommentPanel(art, panel);

        // 折叠/展开
        toggle.addEventListener('click', (e) => {
          e.stopPropagation();
          panel.classList.toggle('show');
          const icon = toggle.querySelector('.fa-chevron-down');
          if (icon) icon.style.transform = panel.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0deg)';
        });

        // 提交评论
        submitBtn.addEventListener('click', async () => {
          const nickname = nicknameInput.value.trim();
          const content = textInput.value.trim();
          if (!content) { alert('请输入评论内容'); return; }
          if (!nickname) { alert('请输入昵称'); return; }
          
          // 禁用按钮防止重复提交
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 提交中';
          
          try {
            await submitCommentToWorker(slug, nickname, content);
            // 重新加载评论
            await renderCommentPanel(art, panel);
            nicknameInput.value = '';
            textInput.value = '';
            // 自动展开面板
            if (!panel.classList.contains('show')) {
              panel.classList.add('show');
              const icon = toggle.querySelector('.fa-chevron-down');
              if (icon) icon.style.transform = 'rotate(180deg)';
            }
          } catch (error) {
            alert('提交失败：' + error.message);
          } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> 发布';
          }
        });
      });

      document.getElementById('stats-text').innerHTML = `当前显示 ${totalFiltered} 篇中的 ${pageArticles.length} 篇 · 第 ${currentPage} / ${totalPages} 页`;
      renderPagination(totalFiltered, totalPages);
    }

    function renderFilterTags() {
      const catContainer = document.getElementById('category-filters');
      const srcContainer = document.getElementById('source-filters');
      let catHtml = `<span class="filter-tag ${currentCategory === '全部' ? 'active' : ''}" data-category="全部">全部 (${articles.length})</span>`;
      allCategories.sort().forEach(cat => { const count = articles.filter(a => a.分类 === cat).length; catHtml += `<span class="filter-tag ${currentCategory === cat ? 'active' : ''}" data-category="${cat}">${cat} (${count})</span>`; });
      catContainer.innerHTML = catHtml;
      let srcHtml = `<span class="filter-tag ${currentSource === '全部' ? 'active' : ''}" data-source="全部">全部 (${articles.length})</span>`;
      allSources.sort().forEach(src => { const count = articles.filter(a => a.公众号名称 === src).length; srcHtml += `<span class="filter-tag ${currentSource === src ? 'active' : ''}" data-source="${src}">${src} (${count})</span>`; });
      srcContainer.innerHTML = srcHtml;
      document.querySelectorAll('[data-category]').forEach(t => t.addEventListener('click', () => { currentCategory = t.dataset.category; currentPage = 1; renderFilterTags(); renderAll(); }));
      document.querySelectorAll('[data-source]').forEach(t => t.addEventListener('click', () => { currentSource = t.dataset.source; currentPage = 1; renderFilterTags(); renderAll(); }));
    }

    function renderPagination(totalItems, totalPages) {
      const pg = document.getElementById('pagination-controls');
      if (totalPages <= 1) { pg.innerHTML = `<span style="color:#7c8fa3;">—— 只有一页 ——</span>`; return; }
      let h = `<button class="pagination-btn" id="prev-page" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i> 上一页</button><div class="page-numbers">`;
      const maxV = 5; let s = Math.max(1, currentPage - 2), e = Math.min(totalPages, s + maxV - 1); if (e - s < maxV - 1) s = Math.max(1, e - maxV + 1);
      if (s > 1) { h += `<span class="page-num" data-page="1">1</span>`; if (s > 2) h += `<span class="page-num disabled">…</span>`; }
      for (let i = s; i <= e; i++) h += `<span class="page-num ${i === currentPage ? 'active-page' : ''}" data-page="${i}">${i}</span>`;
      if (e < totalPages) { if (e < totalPages - 1) h += `<span class="page-num disabled">…</span>`; h += `<span class="page-num" data-page="${totalPages}">${totalPages}</span>`; }
      h += `</div><button class="pagination-btn" id="next-page" ${currentPage === totalPages ? 'disabled' : ''}>下一页 <i class="fas fa-chevron-right"></i></button>`;
      pg.innerHTML = h;
      document.querySelectorAll('[data-page]').forEach(b => b.addEventListener('click', () => { const p = parseInt(b.dataset.page); if (p !== currentPage) { currentPage = p; renderAll(); window.scrollTo({top:0,behavior:'smooth'}); } }));
      document.getElementById('prev-page')?.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderAll(); window.scrollTo({top:0,behavior:'smooth'}); } });
      document.getElementById('next-page')?.addEventListener('click', () => { if (currentPage < totalPages) { currentPage++; renderAll(); window.scrollTo({top:0,behavior:'smooth'}); } });
    }

    function renderAll() { renderCards(); }

    const searchInput = document.getElementById('search-input');
    const clearSearchBtn = document.getElementById('clear-search-btn');
    function applySearch() {
      searchKeyword = searchInput.value.trim();
      currentPage = 1;
      renderAll();
    }
    searchInput.addEventListener('input', applySearch);
    clearSearchBtn.addEventListener('click', () => {
      searchInput.value = '';
      applySearch();
    });

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('reset-filters-btn').addEventListener('click', () => {
        currentCategory = '全部';
        currentSource = '全部';
        searchInput.value = '';
        searchKeyword = '';
        currentPage = 1;
        renderFilterTags();
        renderAll();
      });
      renderFilterTags();
      renderAll();
    });
  })();
</script>
