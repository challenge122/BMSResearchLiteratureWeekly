<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能电池技术周报</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
            --shadow-color: rgba(0, 0, 0, 0.08);
            --primary-color: #4361ee;
            --secondary-color: #7209b7;
            --success-color: #4cc9f0;
            
            /* 分类颜色 */
            --category-1: #e3f2fd;
            --category-2: #f3e5f5;
            --category-3: #e8f5e8;
            --category-4: #fff3e0;
            --category-5: #f1f8e9;
            --category-6: #ffebee;
            --category-7: #fce4ec;
            --category-8: #e0f2f1;
            --category-9: #f5f5f5;
        }

        .dark-mode {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #333333;
            --shadow-color: rgba(0, 0, 0, 0.3);
            --category-1: #1a237e;
            --category-2: #4a148c;
            --category-3: #1b5e20;
            --category-4: #e65100;
            --category-5: #33691e;
            --category-6: #b71c1c;
            --category-7: #880e4f;
            --category-8: #004d40;
            --category-9: #424242;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        h1 {
            font-size: 2.2rem;
            color: var(--primary-color);
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: var(--secondary-color);
            font-size: 1rem;
            opacity: 0.8;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 2px 8px var(--shadow-color);
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--secondary-color);
        }

        .filter-select {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 1rem;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .theme-toggle {
            padding: 10px 20px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, opacity 0.2s;
            align-self: flex-end;
        }

        .theme-toggle:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 12px var(--shadow-color);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid var(--border-color);
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px var(--shadow-color);
        }

        .card-header {
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .category-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 6px;
            margin-bottom: 6px;
        }

        .category-1 { background-color: var(--category-1); }
        .category-2 { background-color: var(--category-2); }
        .category-3 { background-color: var(--category-3); }
        .category-4 { background-color: var(--category-4); }
        .category-5 { background-color: var(--category-5); }
        .category-6 { background-color: var(--category-6); }
        .category-7 { background-color: var(--category-7); }
        .category-8 { background-color: var(--category-8); }
        .category-9 { background-color: var(--category-9); }

        .field {
            margin-bottom: 12px;
        }

        .field-label {
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 4px;
            display: block;
        }

        .field-value {
            color: var(--text-color);
        }

        .conclusion {
            font-style: italic;
            background-color: rgba(0, 0, 0, 0.03);
            padding: 10px;
            border-radius: 6px;
            border-left: 4px solid var(--success-color);
        }

        .dark-mode .conclusion {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .bms-value {
            line-height: 1.6;
        }

        .link {
            display: inline-block;
            padding: 8px 16px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }

        .link:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .page-btn {
            padding: 8px 16px;
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            min-width: 40px;
        }

        .page-btn:hover:not(.active):not(.disabled) {
            background-color: var(--border-color);
        }

        .page-btn.active {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .page-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stats {
            text-align: center;
            margin-top: 20px;
            color: var(--secondary-color);
            font-weight: 600;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: var(--secondary-color);
            font-size: 1.1rem;
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            .cards-container {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .filter-group {
                min-width: 100%;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .card {
                padding: 16px;
            }
        }
    </style>
</head>

            // 全局变量
            var currentPage = 1;
            var itemsPerPage = 6;
            var filteredArticles = articles.slice(); // 复制数组
            var currentCategory = 'all';
            var currentAccount = 'all';

            // DOM元素
            var cardsContainer = document.getElementById('cardsContainer');
            var paginationContainer = document.getElementById('pagination');
            var statsElement = document.getElementById('stats');
            var categoryFilter = document.getElementById('categoryFilter');
            var accountFilter = document.getElementById('accountFilter');
            var themeToggle = document.getElementById('themeToggle');

            // 初始化
            function init() {
                try {
                    // 立即显示一些内容，避免空白
                    renderCards();
                    renderPagination();
                    updateStats();
                    
                    // 事件监听
                    if (categoryFilter) {
                        categoryFilter.addEventListener('change', handleFilterChange);
                    }
                    
                    if (accountFilter) {
                        accountFilter.addEventListener('change', handleFilterChange);
                    }
                    
                    if (themeToggle) {
                        themeToggle.addEventListener('click', toggleTheme);
                    }
                    
                    // 确保页面加载后立即执行
                    setTimeout(function() {
                        window.scrollTo(0, 0);
                    }, 100);
                } catch (error) {
                    // 如果出错，至少显示错误信息
                    if (statsElement) {
                        statsElement.innerHTML = '页面加载出错，请刷新重试';
                    }
                    console.error('初始化错误:', error);
                }
            }

            // 处理筛选变化
            function handleFilterChange() {
                currentCategory = categoryFilter ? categoryFilter.value : 'all';
                currentAccount = accountFilter ? accountFilter.value : 'all';
                
                // 应用筛选
                filteredArticles = articles.filter(function(article) {
                    var categoryMatch = currentCategory === 'all' || article.category === currentCategory;
                    var accountMatch = currentAccount === 'all' || article.account === currentAccount;
                    return categoryMatch && accountMatch;
                });
                
                currentPage = 1;
                renderCards();
                renderPagination();
                updateStats();
            }

            // 渲染卡片
            function renderCards() {
                if (!cardsContainer) return;
                
                cardsContainer.innerHTML = '';
                
                if (filteredArticles.length === 0) {
                    cardsContainer.innerHTML = '<div class="no-results"><h3>暂无匹配的文章</h3><p>请尝试选择其他分类或公众号</p></div>';
                    return;
                }
                
                var startIndex = (currentPage - 1) * itemsPerPage;
                var endIndex = startIndex + itemsPerPage;
                var currentArticles = filteredArticles.slice(startIndex, endIndex);
                
                currentArticles.forEach(function(article) {
                    var categoryClass = getCategoryClass(article.category);
                    
                    var card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = 
                        '<div class="card-header">' +
                            '<h3 class="card-title">' + escapeHtml(article.title) + '</h3>' +
                            '<span class="category-badge ' + categoryClass + '">' + escapeHtml(article.category) + '</span>' +
                        '</div>' +
                        '<div class="field">' +
                            '<span class="field-label">公众号：</span>' +
                            '<span class="field-value">' + escapeHtml(article.account) + '</span>' +
                        '</div>' +
                        '<div class="field">' +
                            '<span class="field-label">发布日期：</span>' +
                            '<span class="field-value">' + escapeHtml(article.date) + '</span>' +
                        '</div>' +
                        '<div class="field">' +
                            '<span class="field-label">结论：</span>' +
                            '<div class="field-value conclusion">' + escapeHtml(article.conclusion) + '</div>' +
                        '</div>' +
                        '<div class="field">' +
                            '<span class="field-label">对BMS应用的价值：</span>' +
                            '<div class="field-value bms-value">' + escapeHtml(article.bmsValue) + '</div>' +
                        '</div>' +
                        '<a href="' + escapeHtml(article.link) + '" target="_blank" class="link">查看原文 →</a>';
                    
                    cardsContainer.appendChild(card);
                });
            }

            // 渲染分页
            function renderPagination() {
                if (!paginationContainer) return;
                
                paginationContainer.innerHTML = '';
                
                var totalPages = Math.ceil(filteredArticles.length / itemsPerPage);
                
                if (totalPages <= 1) return;
                
                // 上一页按钮
                var prevButton = document.createElement('button');
                prevButton.className = 'page-btn' + (currentPage === 1 ? ' disabled' : '');
                prevButton.textContent = '←';
                prevButton.disabled = currentPage === 1;
                prevButton.addEventListener('click', function() {
                    if (currentPage > 1) {
                        currentPage--;
                        renderCards();
                        renderPagination();
                    }
                });
                paginationContainer.appendChild(prevButton);
                
                // 页码按钮
                var maxVisiblePages = 5;
                var startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
                var endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);
                
                if (endPage - startPage + 1 < maxVisiblePages) {
                    startPage = Math.max(1, endPage - maxVisiblePages + 1);
                }
                
                for (var i = startPage; i <= endPage; i++) {
                    var pageButton = document.createElement('button');
                    pageButton.className = 'page-btn' + (i === currentPage ? ' active' : '');
                    pageButton.textContent = i;
                    pageButton.addEventListener('click', (function(page) {
                        return function() {
                            currentPage = page;
                            renderCards();
                            renderPagination();
                        };
                    })(i));
                    paginationContainer.appendChild(pageButton);
                }
                
                // 下一页按钮
                var nextButton = document.createElement('button');
                nextButton.className = 'page-btn' + (currentPage === totalPages ? ' disabled' : '');
                nextButton.textContent = '→';
                nextButton.disabled = currentPage === totalPages;
                nextButton.addEventListener('click', function() {
                    if (currentPage < totalPages) {
                        currentPage++;
                        renderCards();
                        renderPagination();
                    }
                });
                paginationContainer.appendChild(nextButton);
            }

            // 更新统计信息
            function updateStats() {
                if (!statsElement) return;
                
                var total = filteredArticles.length;
                var start = (currentPage - 1) * itemsPerPage + 1;
                var end = Math.min(currentPage * itemsPerPage, total);
                
                var statsText = '共 ' + total + ' 篇文章';
                if (total > 0) {
                    statsText += '，当前显示第 ' + start + ' - ' + end + ' 篇';
                }
                
                if (currentCategory !== 'all') {
                    statsText += ' | 分类：' + currentCategory;
                }
                
                if (currentAccount !== 'all') {
                    statsText += ' | 公众号：' + currentAccount;
                }
                
                statsElement.textContent = statsText;
            }

            // 获取分类CSS类
            function getCategoryClass(category) {
                var categoryMap = {
                    '新材料体系': 'category-1',
                    'SOH估计/SOC估算/寿命': 'category-2',
                    '先进的电池模型': 'category-3',
                    'EIS检测': 'category-4',
                    'AI/机器学习方法在BMS应用的专题': 'category-5',
                    '电池异常诊断': 'category-6',
                    '热失控专题': 'category-7',
                    '非乘用车场景BMS': 'category-8',
                    '无分类': 'category-9'
                };
                return categoryMap[category] || 'category-9';
            }

            // 切换主题
            function toggleTheme() {
                document.body.classList.toggle('dark-mode');
                if (themeToggle) {
                    themeToggle.textContent = document.body.classList.contains('dark-mode') ? '🌕 浅色模式' : '🌓 深色模式';
                }
            }

            // HTML转义函数，防止XSS攻击
            function escapeHtml(text) {
                if (typeof text !== 'string') return text;
                var div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // 页面加载完成后初始化
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                // DOM已经加载完成
                init();
            }
        })();
    </script>
